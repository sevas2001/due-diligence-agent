services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ddagent}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-duediligence}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ddagent}"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: .
    env_file: .env
    environment:
      # Dentro de la red de compose el host de la DB es "db".
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-ddagent}:${POSTGRES_PASSWORD:-changeme}@db:5432/${POSTGRES_DB:-duediligence}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

  frontend:
    build: .
    command: streamlit run frontend/streamlit_app.py --server.address=0.0.0.0 --server.port=8501
    environment:
      API_URL: http://api:8000
    depends_on:
      - api
    ports:
      - "8501:8501"

volumes:
  pgdata:
